CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_ESB=y
CONFIG_DK_LIBRARY=y
CONFIG_CLOCK_CONTROL=y

# Required for ESB on nRF54L15 (DPPIC instance 10).
CONFIG_NRFX_DPPI10=y

# Console UART is shared with the Hub RC link (HUART-RC protocol).
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SETTINGS=y
CONFIG_ZMS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x2000
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_ENTROPY_GENERATOR=y

# Required by rc_uart_log_fwd custom log backend.
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_OUTPUT=y

# RC servo/ESC PWM outputs on Port P1 (pwm20 + pwm21).
CONFIG_PWM=y
